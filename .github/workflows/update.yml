name: Update revisions

on:
  workflow_dispatch:
  schedule:
    - cron: '45 */6 * * *'

jobs:
  main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: 'registry.fedoraproject.org/fedora-minimal:43'

    steps:
      - name: Prepare
        run: |
          dnf -y install --nodocs --setopt=install_weak_deps=0 \
            git-core rpm-build curl perl-interpreter jq rpmdevtools copr-cli parallel python3

      - uses: actions/checkout@v4

      - name: Run updaters
        env:
          COPR_WEBHOOK_ID: ${{ secrets.COPR_WEBHOOK_ID }}
          COPR_WEBHOOK_TOKEN: ${{ secrets.COPR_WEBHOOK_TOKEN }}
        run: |
          set -euo pipefail

          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

          while IFS= read -r -d '' dir; do
            if [[ -f "$dir/update.py" ]]; then
              (cd "$dir" && python3 update.py)
            elif [[ -f "$dir/update.sh" ]]; then
              (cd "$dir" && bash update.sh)
            fi
          done < <(find . -type d -print0)
